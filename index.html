<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="css/styles.css"/>
    <meta http-equiv="X-UA-Compatible" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
</head>
<body>
<header class="header">
    <h1 class="header__text ">HangMan The Game</h1>
</header>
<section class="menu">
<button class="menu__button">Start</button>
</section>
<section class='game hidden'>
    <section class="viev">
        <h1 class="viev__text"></h1>
    </section>
    <main class="main">
        <button class="main__button" value="A">A</button>
        <button class="main__button" value="B">B</button>
        <button class="main__button" value="C">C</button>
        <button class="main__button" value="D">D</button>
        <button class="main__button" value="E">E</button>
        <button class="main__button" value="F">F</button>
        <button class="main__button" value="G">G</button>
        <button class="main__button" value="H">H</button>
        <button class="main__button" value="I">I</button>
        <button class="main__button" value="J">J</button>
        <button class="main__button" value="K">K</button>
        <button class="main__button" value="L">L</button>
        <button class="main__button" value="M">M</button>
        <button class="main__button" value="N">N</button>
        <button class="main__button" value="O">O</button>
        <button class="main__button" value="P">P</button>
        <button class="main__button" value="R">R</button>
        <button class="main__button" value="S">S</button>
        <button class="main__button" value="T">T</button>
        <button class="main__button" value="U">U</button>
        <button class="main__button" value="W">W</button>
        <button class="main__button" value="Y">Y</button>
        <button class="main__button" value="Z">Z</button>
        <button class="main__button" value="Ź">Ź</button> 
        <button class="main__button" value="Ż">Ż</button>
    </main>
</section>
<section class="endMenu hidden">
    <button class="endMenu__button  endMenu__button--reset">Reset</button>
    <button class="endMenu__button  endMenu__button--goBack">Go to begin</button>
</section>
<script src="js/script.js"></script>
</body>
</html>
